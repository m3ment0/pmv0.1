<!DOCTYPE html>
<html>

<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>registrar Usuarios</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <link rel="stylesheet" href="assets/css/styles_registro.css">

</head>

<body>

  <div class="container-fluid p-4 text-center bg-white">
    <h1 class="titulo">R E G I S T R A R &nbsp U S U A R I O</h1>
  </div>
  <div class="row">

  </div>
  <!-- Formulario -->
  <div class="container fw-bold mt-5">
    <form action="/usuarios/registrar" method="post" class="formulario ">
      <div class="row ">
        <label class="col-2 col-form-label">Nombres</label>
        <div class="col-10 ">
          <input type="text" class="form-control w-50 mb-3 " id="inputNombres" name="nombres" required>
        </div>
      </div>
      <div class="row">
        <label class="col-2 col-form-label" id="labelRol">N° Documento</label>
        <div class="col-10 ">
          <input type="text" class="form-control w-50 mb-3" id="inputUsuario" name="documento" required>
        </div>
      </div>
      <div class="row">
        <label class="col-2 col-form-label" id="labelTelefono">Telefono</label>
        <div class="col-10">
          <input type="text" class="form-control w-50 mb-3" id="inputTelefono" name="telefono" required>
        </div>
      </div>
      <div class="row">
        <label class="col-2 col-form-label" id="labelCorreo">Correo</label>
        <div class="col-10">
          <input type="email" class="form-control w-50 mb-3" id="inputTelefono" name="correo" required>
        </div>
      </div>
      <div class="row">
        <label class="col-2 col-form-label" id="labelUsuario">Nombre Usuario</label>
        <div class="col-10">
          <input type="text" class="form-control w-50 mb-3" id="inputUsuario" name="usuario" required>
        </div>
      </div>
      <div class="row">
        <label class="col-2 col-form-label" id="labelRol">Contraseña</label>
        <div class="col-10 ">
          <input type="password" class="form-control w-50 mb-3" id="inputContraseña" name="contraseña" required>
        </div>
      </div>

      <div class="row ">

        <div class="mb-5 ">
          <label class="col-2 col-form-label" id="labelRol">Rol</label>

          <select class=" border-primary" id="selecRol" name="selecrol" required>
            <option selected>Selecciona un Rol</option>
            <option value="Administrador">Administrador</option>
            <option value="Odontologo">Odontologo</option>
          </select>
        </div>
      </div>
	  
  </div>


  <div class="row mt-5 justify-content-center g-0">

    <div class="col-6 me-5 ">
      <div class="">
        <a class="btn btn-primary" href="index.html" role="button">Principal</a>
          <!-- <button type="submit" class="btn btn-primary">Principal</button> -->
          <button type="submit" class="btn btn-primary">Guardar</button>
          <button type="submit" class="btn btn-primary">Nuevo</button>

      </div>

    </div>

  </div>
  
  	<!-- Footer -->
  <footer class="footer bg-white text-center text-lg-start mt-5">
    <!-- Copyright Footer -->
    <div class="text-center p-3">
      &copy; 2025 OdontoSoft
      <a class="text-dark" href="index.html">OdontoSoft</a>
    </div>
    <!-- Copyright Footer-->
  </footer>
<!-- Footer -->
  
  </form>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>

 
</body>

</html>
